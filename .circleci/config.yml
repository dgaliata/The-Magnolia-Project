version: 2.1

executors:
  default:
    docker:
      - image: cimg/python:3.12

jobs:
  secret-scanning:
    executor: default
    steps:
      - checkout
      - run:
          name: Install gitleaks
          command: |
            wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.3/gitleaks_8.18.3_linux_x64.tar.gz
            tar -xzf gitleaks_8.18.3_linux_x64.tar.gz
      - run:
          name: Scan for secrets
          command: |
            ./gitleaks detect --report-path gitleaks-report.json
      - store_artifacts:
          path: gitleaks-report.json
          destination: secrets-scan

  semgrep-scan:
    executor: default
    steps:
      - checkout
      - run:
          name: Install semgrep
          command: |
            pip3 install semgrep
      - run:
          name: Run semgrep
          command: |
            semgrep --config=auto --json --output=semgrep-report.json .
      - store_artifacts:
          path: semgrep-report.json
          destination: semgrep-scan

  pip-audit:
    executor: default
    steps:
      - checkout
      - run:
          name: Install pip-audit
          command: |
            pip3 install pip-audit
      - run:
          name: Scan dependencies
          command: |
            pip-audit -r requirements.txt --format=json --output=pip-audit.json || true
      - store_artifacts:
          path: pip-audit.json
          destination: pip-audit

  terraform-security:
    executor: default
    steps:
      - checkout
      - run:
          name: Install tfsec
          command: |
            brew install tfsec || wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.0.11/tfsec-linux-amd64 -O tfsec && chmod +x tfsec
      - run:
          name: Scan Terraform
          command: |
            ./tfsec . --format=json --out=tfsec-report.json || true
      - store_artifacts:
          path: tfsec-report.json
          destination: tfsec-report

workflows:
  security-scans:
    jobs:
      - secret-scanning
      - semgrep-scan
      - pip-audit
      - terraform-security