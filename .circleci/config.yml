version: 2.1

executors:
  default:
    docker:
      - image: cimg/python:3.12

jobs:
  secret-scanning:
    executor: default
    steps:
      - checkout
      - run:
          name: Install gitleaks
          command: |
            wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.3/gitleaks_8.18.3_linux_x64.tar.gz
            tar -xzf gitleaks_8.18.3_linux_x64.tar.gz
      - run:
          name: Scan for secrets
          command: |
            ./gitleaks detect --report-path gitleaks-report.json
      - store_artifacts:
          path: gitleaks-report.json
          destination: secrets-scan

  semgrep-scan:
    executor: default
    steps:
      - checkout
      - run:
          name: Install semgrep
          command: |
            pip3 install semgrep
      - run:
          name: Run semgrep
          command: |
            semgrep --config=auto --json --output=semgrep-report.json .
      - store_artifacts:
          path: semgrep-report.json
          destination: semgrep-scan

  pip-audit:
    executor: default
    steps:
      - checkout
      - run:
          name: Install pip-audit
          command: |
            pip3 install pip-audit
      - run:
          name: Scan dependencies
          command: |
            pip-audit -r requirements.txt --format=json --output=pip-audit.json || true
      - store_artifacts:
          path: pip-audit.json
          destination: pip-audit

  terraform-security:
    executor: default
    steps:
      - checkout
      - run:
          name: Install tfsec
          command: |
            wget -q https://github.com/aquasecurity/tfsec/releases/download/v1.0.11/tfsec-linux-amd64 -O tfsec && chmod +x tfsec
      - run:
          name: Scan Terraform
          command: |
            ./tfsec ./terraform --format=json --out=tfsec-report.json || true
      - store_artifacts:
          path: tfsec-report.json
          destination: tfsec-report

  trivy-scan:
    executor: default
    steps:
      - checkout
      - run:
          name: Install trivy
          command: |
            curl -L https://github.com/aquasecurity/trivy/releases/download/v0.69.2/trivy_0.69.2_Linux-64bit.tar.gz -o trivy.tar.gz
            tar -xzf trivy.tar.gz
            rm trivy.tar.gz
      - run:
          name: Scan with trivy
          command: |
            ./trivy fs --security-checks vuln,config --format json --output trivy-report.json . || true
      - store_artifacts:
          path: trivy-report.json
          destination: trivy-scan

  checkov-scan:
    executor: default
    steps:
      - checkout
      - run:
          name: Install checkov
          command: |
            pip3 install checkov
      - run:
          name: Scan Infrastructure as Code
          command: |
            checkov --directory . --output json --output-file checkov-report.json || true
      - store_artifacts:
          path: checkov-report.json
          destination: checkov-scan

workflows:
  security-scans:
    jobs:
      - secret-scanning
      - semgrep-scan
      - pip-audit
      - terraform-security
      - trivy-scan
      - checkov-scan